<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Create smooth color transitions using radial gradients -->
    <radialGradient id="red" cx="50%" cy="0%">
      <stop offset="0%" style="stop-color:#ff0000" />
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="yellow" cx="75%" cy="25%">
      <stop offset="0%" style="stop-color:#ffff00" />
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="green" cx="100%" cy="50%">
      <stop offset="0%" style="stop-color:#00ff00" />
      <stop offset="100%" style="stop-color:#00ff00;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="cyan" cx="75%" cy="75%">
      <stop offset="0%" style="stop-color:#00ffff" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="blue" cx="50%" cy="100%">
      <stop offset="0%" style="stop-color:#0000ff" />
      <stop offset="100%" style="stop-color:#0000ff;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="magenta" cx="25%" cy="75%">
      <stop offset="0%" style="stop-color:#ff00ff" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="orange" cx="87%" cy="12.5%">
      <stop offset="0%" style="stop-color:#ff8800" />
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="lime" cx="87%" cy="87%">
      <stop offset="0%" style="stop-color:#88ff00" />
      <stop offset="100%" style="stop-color:#88ff00;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="purple" cx="25%" cy="25%">
      <stop offset="0%" style="stop-color:#8800ff" />
      <stop offset="100%" style="stop-color:#8800ff;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="center" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="40%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15" />
    </radialGradient>
  </defs>
  
  <!-- Base circle -->
  <circle cx="50" cy="50" r="45" fill="#888" />
  
  <!-- Layer colors -->
  <circle cx="50" cy="50" r="45" fill="url(#red)" />
  <circle cx="50" cy="50" r="45" fill="url(#yellow)" />
  <circle cx="50" cy="50" r="45" fill="url(#green)" />
  <circle cx="50" cy="50" r="45" fill="url(#cyan)" />
  <circle cx="50" cy="50" r="45" fill="url(#blue)" />
  <circle cx="50" cy="50" r="45" fill="url(#magenta)" />
  <circle cx="50" cy="50" r="45" fill="url(#orange)" />
  <circle cx="50" cy="50" r="45" fill="url(#lime)" />
  <circle cx="50" cy="50" r="45" fill="url(#purple)" />
  
  <!-- White center gradient -->
  <circle cx="50" cy="50" r="45" fill="url(#center)" />
  
  <!-- 3D sphere highlight -->
  <circle cx="50" cy="50" r="45" fill="url(#highlight)" />
</svg>
